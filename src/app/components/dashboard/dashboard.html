<div class="container mt-4">
  <!-- Header Section -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold">Available Freelance Jobs</h2>
    <!-- Role එක CLIENT නම් පමණක් බොත්තම පෙන්වයි -->
    <button class="btn btn-primary" *ngIf="loggedInUser?.role === 'CLIENT'" data-bs-toggle="modal" data-bs-target="#jobModal">
      + Post a Job
    </button>
  </div>

  <!-- Jobs Display Section -->
  <div class="row">
    <div class="col-md-4 mb-4" *ngFor="let job of jobs">
      <div class="card h-100 shadow-sm border-0">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-start mb-2">
            <h5 class="card-title text-primary fw-bold mb-0">{{ job.title }}</h5>
            <span class="badge bg-success-subtle text-success border border-success-subtle">
              ${{ job.budget }}
            </span>
          </div>
          <span class="badge bg-light text-dark border mb-3">{{ job.category }}</span>
          <p class="card-text text-muted" style="font-size: 0.95rem;">
            {{ job.description }}
          </p>
        </div>
        <div class="card-footer bg-transparent border-0 pb-3">
          <button class="btn btn-outline-primary btn-sm w-100">View Details</button>
        </div>
      </div>
    </div>

    <!-- Jobs නැතිනම් පෙන්වන පණිවිඩය -->
    <div class="col-12 text-center my-5" *ngIf="jobs.length === 0">
      <div class="py-5">
        <i class="bi bi-briefcase text-muted" style="font-size: 3rem;"></i>
        <p class="text-muted mt-3 fs-5">No jobs available at the moment.</p>
      </div>
    </div>
  </div>
</div>

<!-- Job Post කරන Modal එක -->
<div class="modal fade" id="jobModal" tabindex="-1" aria-labelledby="jobModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow-lg">
      <div class="modal-header bg-primary text-white">
        <h5 class="modal-title fw-bold" id="jobModalLabel">Post a New Job</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body p-4">
        <form (ngSubmit)="onPostJob()" #jobForm="ngForm">
          <div class="mb-3">
            <label class="form-label fw-semibold">Job Title</label>
            <input type="text" class="form-control" name="title" [(ngModel)]="newJob.title" placeholder="e.g. E-commerce Website" required>
          </div>

          <div class="row mb-3">
            <div class="col-md-6">
              <label class="form-label fw-semibold">Category</label>
              <select class="form-select" name="category" [(ngModel)]="newJob.category">
                <option value="Web Development">Web Development</option>
                <option value="Mobile App">Mobile App</option>
                <option value="UI/UX Design">UI/UX Design</option>
                <option value="Graphic Design">Graphic Design</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Budget ($)</label>
              <input type="number" class="form-control" name="budget" [(ngModel)]="newJob.budget" required>
            </div>
          </div>

          <div class="mb-4">
            <label class="form-label fw-semibold">Description</label>
            <textarea class="form-control" name="description" [(ngModel)]="newJob.description" rows="4" required></textarea>
          </div>

          <div class="d-grid">
            <!-- data-bs-dismiss ඉවත් කර ඇත, TypeScript මගින් මෙය පාලනය කරයි -->
            <button type="submit" class="btn btn-success btn-lg fw-bold" [disabled]="!jobForm.valid">
              Submit Job Listing
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
