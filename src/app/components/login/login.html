<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow">
        <div class="card-header bg-success text-white">
          <h3 class="text-center">Login</h3>
        </div>
        <div class="card-body">
          <form (ngSubmit)="onLogin()">
            <div class="mb-3">
              <label class="form-label">Username</label>
              <input type="text" class="form-control" name="username" [(ngModel)]="credentials.username" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Password</label>
              <input type="password" class="form-control" name="password" [(ngModel)]="credentials.password" required>
            </div>
            <button type="submit" class="btn btn-success w-100">Login</button>
          </form>
          <div class="mt-3 text-center">
            <a routerLink="/register">Don't have an account? Register here</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
